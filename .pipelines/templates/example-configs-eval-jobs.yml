parameters:
  - name: agentName
    type: string
  - name: agentSuffix
    type: string
  - name: resultsOutputBase
    type: string
    default: 'c:/example_configs_results'
  - name: runDate
    type: string
    default: 'auto'
  - name: modelTimeout
    type: number
    default: 1200
  - name: evalOnly
    type: boolean
    default: true
  - name: cleanResultsFirst
    type: boolean
    default: true
  # pairNames: list of EP/hardware pair keys defined in the catalog below.
  # Each name resolves to {ep, hardware, device, displayName} at runtime in PowerShell.
  # Catalog (kept in sync across all PowerShell blocks in this template):
  #   qnn_npu     -> ep=qnn,      hardware=npu, device=npu, displayName='QNN NPU'
  #   qnn_gpu     -> ep=qnn,      hardware=gpu, device=gpu, displayName='QNN GPU'
  #   vitisai_npu -> ep=vitisai,  hardware=npu, device=npu, displayName='VitisAI NPU'
  #   dml_gpu     -> ep=dml,      hardware=gpu, device=gpu, displayName='DML GPU'
  #   mlas_cpu    -> ep=mlas,     hardware=cpu, device=cpu, displayName='MLAS CPU'
  #   ov_cpu      -> ep=openvino, hardware=cpu, device=cpu, displayName='OV CPU'
  #   ov_gpu      -> ep=openvino, hardware=gpu, device=gpu, displayName='OV GPU'
  #   ov_npu      -> ep=openvino, hardware=npu, device=npu, displayName='OV NPU'
  - name: pairNames
    type: object

jobs:
  - job: Prepare_${{ parameters.agentSuffix }}
    displayName: 'Prepare Example Matrix (${{ parameters.agentSuffix }})'
    pool:
      name: modelkit-selfhost-pool
      demands:
        - Agent.Name -equals ${{ parameters.agentName }}

    steps:
      - checkout: self
        clean: false
        fetchDepth: 1
        path: s

      - powershell: |
          $uvBin = "$env:USERPROFILE\.local\bin"
          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            Invoke-RestMethod https://astral.sh/uv/0.10.12/install.ps1 | Invoke-Expression
            $env:PATH = "$uvBin;$env:PATH"
          }
          uv python install 3.11
          Remove-Item -Recurse -Force "$(Build.SourcesDirectory)\.venv" -ErrorAction SilentlyContinue
          uv venv $(Build.SourcesDirectory)\.venv --python 3.11
          $venvDir = "$(Build.SourcesDirectory)\.venv\Scripts"
          Write-Host "##vso[task.prependpath]$uvBin"
          Write-Host "##vso[task.prependpath]$venvDir"
        displayName: 'Install uv 0.10.12 and Python 3.11'

      - script: python --version
        displayName: 'Check Python version'

      - task: PipAuthenticate@1
        inputs:
          artifactFeeds: 'windows.ai.toolkit/Modelkit'
        displayName: 'Authenticate pip with Azure Artifacts'

      - script: uv pip install -e .[dev]
        workingDirectory: $(Build.SourcesDirectory)
        displayName: 'Install dependencies'

      - powershell: |
          $runDate = '${{ parameters.runDate }}'
          if (-not $runDate -or $runDate -eq 'auto') { $runDate = Get-Date -Format 'yyyy-MM-dd' }
          $dir = "${{ parameters.resultsOutputBase }}/$runDate/${{ parameters.agentSuffix }}"
          Write-Host "##vso[task.setvariable variable=RESULTS_DIR;isOutput=true]$dir"
          Write-Host "Pipeline results staging directory (per-pair subdirs created later): $dir"
        name: set_output_dir
        displayName: 'Set results output directory'

      - powershell: |
          if ('${{ parameters.cleanResultsFirst }}' -ne 'True') {
            Write-Host "cleanResultsFirst=false - leaving prior result files in place (resume mode)"
            return
          }
          $catalog = @{
              'qnn_npu'     = @{ ep = 'qnn';      hardware = 'npu' }
              'qnn_gpu'     = @{ ep = 'qnn';      hardware = 'gpu' }
              'vitisai_npu' = @{ ep = 'vitisai';  hardware = 'npu' }
              'dml_gpu'     = @{ ep = 'dml';      hardware = 'gpu' }
              'mlas_cpu'    = @{ ep = 'mlas';     hardware = 'cpu' }
              'ov_cpu'      = @{ ep = 'openvino'; hardware = 'cpu' }
              'ov_gpu'      = @{ ep = 'openvino'; hardware = 'gpu' }
              'ov_npu'      = @{ ep = 'openvino'; hardware = 'npu' }
          }
          $pairNames = '${{ join(',', parameters.pairNames) }}' -split ','
          $pairNames = @($pairNames | Where-Object { $_ -and $_.Trim() -ne '' } | ForEach-Object { $_.Trim() })
          $totalRemoved = 0
          foreach ($name in $pairNames) {
              if (-not $catalog.ContainsKey($name)) { continue }
              $pair = $catalog[$name]
              $root = "$(Build.SourcesDirectory)/examples/$($pair.ep)/$($pair.hardware)"
              if (-not (Test-Path $root)) { continue }
              $patterns = @('*_perf_result.json', '*_eval_result.json', '*_perf_result.error.txt', '*_eval_result.error.txt', '*_perf_result.timeout', '*_eval_result.timeout')
              foreach ($pat in $patterns) {
                  $files = Get-ChildItem -Path $root -Recurse -Filter $pat -ErrorAction SilentlyContinue
                  foreach ($f in $files) {
                      Remove-Item $f.FullName -Force -ErrorAction SilentlyContinue
                      $totalRemoved++
                  }
              }
              Write-Host "Cleaned stale result files under $root"
          }
          Write-Host "Removed $totalRemoved stale result file(s) total"
        displayName: 'Clean stale result files in examples/'

      - powershell: |
          $catalog = @{
              'qnn_npu'     = @{ ep = 'qnn';      hardware = 'npu'; device = 'npu'; displayName = 'QNN NPU' }
              'qnn_gpu'     = @{ ep = 'qnn';      hardware = 'gpu'; device = 'gpu'; displayName = 'QNN GPU' }
              'vitisai_npu' = @{ ep = 'vitisai';  hardware = 'npu'; device = 'npu'; displayName = 'VitisAI NPU' }
              'dml_gpu'     = @{ ep = 'dml';      hardware = 'gpu'; device = 'gpu'; displayName = 'DML GPU' }
              'mlas_cpu'    = @{ ep = 'mlas';     hardware = 'cpu'; device = 'cpu'; displayName = 'MLAS CPU' }
              'ov_cpu'      = @{ ep = 'openvino'; hardware = 'cpu'; device = 'cpu'; displayName = 'OV CPU' }
              'ov_gpu'      = @{ ep = 'openvino'; hardware = 'gpu'; device = 'gpu'; displayName = 'OV GPU' }
              'ov_npu'      = @{ ep = 'openvino'; hardware = 'npu'; device = 'npu'; displayName = 'OV NPU' }
          }
          $pairNames = '${{ join(',', parameters.pairNames) }}' -split ','
          $pairNames = @($pairNames | Where-Object { $_ -and $_.Trim() -ne '' } | ForEach-Object { $_.Trim() })
          if (-not $pairNames -or $pairNames.Count -eq 0) {
              Write-Error "No EP/hardware pair names configured for this stage"
              exit 1
          }
          foreach ($name in $pairNames) {
              if (-not $catalog.ContainsKey($name)) {
                  Write-Error "Unknown EP/hardware pair name: '$name'. Valid: $($catalog.Keys -join ', ')"
                  exit 1
              }
          }

          $evalOnly = ('${{ parameters.evalOnly }}' -eq 'True')

          # rowsByKey: matrix-key -> @{ entry = base-fields; pendingPairs = ordered list }
          $rowsByKey = [ordered]@{}
          $usedKeys = @{}

          foreach ($name in $pairNames) {
              $pair = $catalog[$name]
              $pairDir = "$(Build.SourcesDirectory)/examples/$($pair.ep)/$($pair.hardware)"
              if (-not (Test-Path $pairDir)) {
                  Write-Warning "Pair '$($pair.displayName)' (name=$name) source directory not found: $pairDir - skipping"
                  continue
              }
              $modelDirs = Get-ChildItem -Path $pairDir -Directory -ErrorAction SilentlyContinue | Sort-Object Name
              $pendingCount = 0
              foreach ($modelDir in $modelDirs) {
                  $configs = Get-ChildItem -Path $modelDir.FullName -Filter '*_config.json' -File -ErrorAction SilentlyContinue
                  if (-not $configs -or $configs.Count -eq 0) { continue }

                  # Determine if at least one config still needs work for this pair.
                  $hasPending = $false
                  foreach ($cfg in $configs) {
                      $stem = $cfg.BaseName -replace '_config$',''
                      $evalDone   = Test-Path (Join-Path $modelDir.FullName "${stem}_eval_result.json")
                      $evalError  = Test-Path (Join-Path $modelDir.FullName "${stem}_eval_result.error.txt")
                      $evalTimeo  = Test-Path (Join-Path $modelDir.FullName "${stem}_eval_result.timeout")
                      $perfDone   = Test-Path (Join-Path $modelDir.FullName "${stem}_perf_result.json")
                      $perfError  = Test-Path (Join-Path $modelDir.FullName "${stem}_perf_result.error.txt")
                      $perfTimeo  = Test-Path (Join-Path $modelDir.FullName "${stem}_perf_result.timeout")

                      $evalSettled = ($evalDone -or $evalError -or $evalTimeo)
                      $perfSettled = ($perfDone -or $perfError -or $perfTimeo)

                      if ($evalOnly) {
                          if (-not $evalSettled) { $hasPending = $true; break }
                      } else {
                          if ((-not $evalSettled) -or (-not $perfSettled)) { $hasPending = $true; break }
                      }
                  }
                  if (-not $hasPending) { continue }

                  $slug = $modelDir.Name
                  $sanitized = ($slug -replace '[^A-Za-z0-9]', '_')
                  if ($usedKeys.ContainsKey($sanitized)) {
                      $key = $usedKeys[$sanitized]
                  } else {
                      $key = $sanitized
                      $suffix = 2
                      while ($rowsByKey.Contains($key)) {
                          $key = "${sanitized}_${suffix}"
                          $suffix++
                      }
                      $usedKeys[$sanitized] = $key
                  }
                  if (-not $rowsByKey.Contains($key)) {
                      $rowsByKey[$key] = @{
                          entry = @{
                              model_slug = [string]$slug
                          }
                          pendingPairs = New-Object System.Collections.Generic.List[string]
                      }
                  }
                  $rowsByKey[$key].pendingPairs.Add($name)
                  $pendingCount++
              }
              Write-Host "Pair '$($pair.displayName)' (name=$name): $pendingCount pending model(s)"
          }

          $total = $rowsByKey.Count
          if ($total -eq 0) {
              Write-Host "All example configs already have results for all selected EP/hardware pairs - nothing to run"
              Write-Host "##vso[task.setvariable variable=modelMatrix;isOutput=true]{}"
              Write-Host "##vso[task.setvariable variable=skipEval;isOutput=true]true"
              return
          }

          $matrix = @{}
          foreach ($key in $rowsByKey.Keys) {
              $row = $rowsByKey[$key]
              $entry = $row.entry.Clone()
              $entry['pairs_csv'] = ($row.pendingPairs -join ',')
              $matrix[$key] = $entry
          }

          $json = $matrix | ConvertTo-Json -Compress -Depth 5
          Write-Host "Prepared matrix for $total model(s) across $($pairNames.Count) EP/hardware pair(s)"
          Write-Host "##vso[task.setvariable variable=modelMatrix;isOutput=true]$json"
        name: set_matrix
        displayName: 'Create matrix variables'

  - job: EvalModel_${{ parameters.agentSuffix }}
    displayName: 'Run Example Sweep (${{ parameters.agentSuffix }})'
    dependsOn: Prepare_${{ parameters.agentSuffix }}
    condition: and(succeeded(), ne(dependencies.Prepare_${{ parameters.agentSuffix }}.outputs['set_matrix.skipEval'], 'true'))
    timeoutInMinutes: 180
    cancelTimeoutInMinutes: 2
    pool:
      name: modelkit-selfhost-pool
      demands:
        - Agent.Name -equals ${{ parameters.agentName }}
    variables:
      RESULTS_DIR: $[ dependencies.Prepare_${{ parameters.agentSuffix }}.outputs['set_output_dir.RESULTS_DIR'] ]
    strategy:
      maxParallel: 1
      matrix: $[ dependencies.Prepare_${{ parameters.agentSuffix }}.outputs['set_matrix.modelMatrix'] ]

    steps:
      - checkout: self
        clean: false
        fetchDepth: 1
        path: s

      - powershell: |
          $uvBin = "$env:USERPROFILE\.local\bin"
          $venvDir = "$(Build.SourcesDirectory)\.venv\Scripts"
          Write-Host "##vso[task.prependpath]$uvBin"
          Write-Host "##vso[task.prependpath]$venvDir"
        displayName: 'Activate Python environment'

      - powershell: |
          Write-Host "Agent.BuildDirectory : $(Agent.BuildDirectory)"
          Write-Host "Build.SourcesDirectory: $(Build.SourcesDirectory)"
          Write-Host "Model: $(model_slug)"
          Write-Host "Pending EP/hardware pairs: $(pairs_csv)"

          $catalog = @{
              'qnn_npu'     = @{ ep = 'qnn';      hardware = 'npu'; device = 'npu'; displayName = 'QNN NPU' }
              'qnn_gpu'     = @{ ep = 'qnn';      hardware = 'gpu'; device = 'gpu'; displayName = 'QNN GPU' }
              'vitisai_npu' = @{ ep = 'vitisai';  hardware = 'npu'; device = 'npu'; displayName = 'VitisAI NPU' }
              'dml_gpu'     = @{ ep = 'dml';      hardware = 'gpu'; device = 'gpu'; displayName = 'DML GPU' }
              'mlas_cpu'    = @{ ep = 'mlas';     hardware = 'cpu'; device = 'cpu'; displayName = 'MLAS CPU' }
              'ov_cpu'      = @{ ep = 'openvino'; hardware = 'cpu'; device = 'cpu'; displayName = 'OV CPU' }
              'ov_gpu'      = @{ ep = 'openvino'; hardware = 'gpu'; device = 'gpu'; displayName = 'OV GPU' }
              'ov_npu'      = @{ ep = 'openvino'; hardware = 'npu'; device = 'npu'; displayName = 'OV NPU' }
          }

          $pairNames = '$(pairs_csv)' -split ','
          $pairNames = @($pairNames | Where-Object { $_ -and $_.Trim() -ne '' } | ForEach-Object { $_.Trim() })
          if (-not $pairNames -or $pairNames.Count -eq 0) {
              Write-Warning "No pending EP/hardware pairs for $(model_slug) - skipping"
              exit 0
          }

          $evalOnly = ('${{ parameters.evalOnly }}' -eq 'True')

          for ($i = 0; $i -lt $pairNames.Count; $i++) {
              $name = $pairNames[$i]
              if (-not $catalog.ContainsKey($name)) {
                  Write-Error "Unknown EP/hardware pair name: '$name'. Valid: $($catalog.Keys -join ', ')"
                  exit 1
              }
              $pair = $catalog[$name]
              Write-Host "============================================================"
              Write-Host "[$($i + 1)/$($pairNames.Count)] pair='$($pair.displayName)' name=$name ep='$($pair.ep)' hardware='$($pair.hardware)' device='$($pair.device)' for $(model_slug)"
              Write-Host "============================================================"

              $uvArgs = @(
                  "run", "--no-sync", "python", "scripts/run_example_tests.py",
                  "--ep", $pair.ep,
                  "--hardware", $pair.hardware,
                  "--device", $pair.device,
                  "--models", "$(model_slug)",
                  "--timeout", "${{ parameters.modelTimeout }}"
              )
              if ($evalOnly) {
                  $uvArgs += "--eval-only"
              }

              & uv @uvArgs
              $sweepExit = $LASTEXITCODE
              if ($sweepExit -ne 0) {
                  Write-Warning "run_example_tests.py exited with code $sweepExit for $(model_slug) on pair '$($pair.displayName)' (model failure - non-blocking)"
              }
          }

          # Clean HF + winml caches after all pairs for this model have run.
          # The script clears caches between models within a single invocation
          # but not at the end, so we do it here to keep disk usage bounded.
          Write-Host "Cleaning HF + winml caches after model $(model_slug)"
          Remove-Item "$env:USERPROFILE\.cache\winml" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:USERPROFILE\.cache\huggingface" -Recurse -Force -ErrorAction SilentlyContinue
          exit 0
        workingDirectory: $(Build.SourcesDirectory)
        displayName: 'Run example sweep for current model (all pending pairs)'

  - ${{ each pairName in parameters.pairNames }}:
      - job: Report_${{ parameters.agentSuffix }}_${{ pairName }}
        displayName: 'Collect & Publish Results (${{ parameters.agentSuffix }} / ${{ pairName }})'
        dependsOn:
          - Prepare_${{ parameters.agentSuffix }}
          - EvalModel_${{ parameters.agentSuffix }}
        condition: always()
        pool:
          name: modelkit-selfhost-pool
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        variables:
          RESULTS_DIR_BASE: $[ dependencies.Prepare_${{ parameters.agentSuffix }}.outputs['set_output_dir.RESULTS_DIR'] ]

        steps:
          - checkout: self
            clean: false
            fetchDepth: 1
            path: s

          - powershell: |
              $catalog = @{
                  'qnn_npu'     = @{ ep = 'qnn';      hardware = 'npu' }
                  'qnn_gpu'     = @{ ep = 'qnn';      hardware = 'gpu' }
                  'vitisai_npu' = @{ ep = 'vitisai';  hardware = 'npu' }
                  'dml_gpu'     = @{ ep = 'dml';      hardware = 'gpu' }
                  'mlas_cpu'    = @{ ep = 'mlas';     hardware = 'cpu' }
                  'ov_cpu'      = @{ ep = 'openvino'; hardware = 'cpu' }
                  'ov_gpu'      = @{ ep = 'openvino'; hardware = 'gpu' }
                  'ov_npu'      = @{ ep = 'openvino'; hardware = 'npu' }
              }
              $name = '${{ pairName }}'
              if (-not $catalog.ContainsKey($name)) {
                  Write-Error "Unknown EP/hardware pair name: '$name'. Valid: $($catalog.Keys -join ', ')"
                  exit 1
              }
              $pair = $catalog[$name]
              $src = "$(Build.SourcesDirectory)/examples/$($pair.ep)/$($pair.hardware)"
              $dst = "$(RESULTS_DIR_BASE)/$name"
              if (-not (Test-Path $src)) {
                  Write-Host "Source dir not found: $src - skipping"
                  Write-Host "##vso[task.setvariable variable=HAS_RESULTS]false"
                  return
              }
              New-Item -ItemType Directory -Path $dst -Force | Out-Null

              $patterns = @('*_perf_result.json', '*_eval_result.json', '*_perf_result.error.txt', '*_eval_result.error.txt', '*_perf_result.timeout', '*_eval_result.timeout')
              $copied = 0
              $stats = @{ perf_pass = 0; perf_fail = 0; perf_timeout = 0; eval_pass = 0; eval_fail = 0; eval_timeout = 0 }
              foreach ($pat in $patterns) {
                  $files = Get-ChildItem -Path $src -Recurse -Filter $pat -File -ErrorAction SilentlyContinue
                  foreach ($f in $files) {
                      $rel = $f.FullName.Substring($src.Length).TrimStart('\','/')
                      $target = Join-Path $dst $rel
                      New-Item -ItemType Directory -Path (Split-Path $target -Parent) -Force | Out-Null
                      Copy-Item $f.FullName -Destination $target -Force
                      $copied++

                      switch -Wildcard ($f.Name) {
                          '*_perf_result.json'        { $stats.perf_pass++ }
                          '*_perf_result.error.txt'   { $stats.perf_fail++ }
                          '*_perf_result.timeout'     { $stats.perf_timeout++ }
                          '*_eval_result.json'        { $stats.eval_pass++ }
                          '*_eval_result.error.txt'   { $stats.eval_fail++ }
                          '*_eval_result.timeout'     { $stats.eval_timeout++ }
                      }
                  }
              }

              if ($copied -eq 0) {
                  Write-Host "No result files found under $src for pair '$name'"
                  Write-Host "##vso[task.setvariable variable=HAS_RESULTS]false"
                  return
              }

              $summary = [ordered]@{
                  pair       = $name
                  ep         = $pair.ep
                  hardware   = $pair.hardware
                  source_dir = $src
                  copied     = $copied
                  perf       = [ordered]@{ pass = $stats.perf_pass; fail = $stats.perf_fail; timeout = $stats.perf_timeout }
                  eval       = [ordered]@{ pass = $stats.eval_pass; fail = $stats.eval_fail; timeout = $stats.eval_timeout }
              }
              $summary | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $dst 'summary.json') -Encoding utf8

              $md = @()
              $md += "# Example Configs Sweep Summary - $name"
              $md += ""
              $md += "- EP: ``$($pair.ep)``"
              $md += "- Hardware: ``$($pair.hardware)``"
              $md += "- Source: ``$src``"
              $md += "- Files collected: $copied"
              $md += ""
              $md += "## Perf"
              $md += "- PASS: $($stats.perf_pass)"
              $md += "- FAIL: $($stats.perf_fail)"
              $md += "- TIMEOUT: $($stats.perf_timeout)"
              $md += ""
              $md += "## Eval"
              $md += "- PASS: $($stats.eval_pass)"
              $md += "- FAIL: $($stats.eval_fail)"
              $md += "- TIMEOUT: $($stats.eval_timeout)"
              ($md -join "`n") | Set-Content -Path (Join-Path $dst 'summary.md') -Encoding utf8

              Write-Host "Copied $copied result file(s) to $dst"
              Write-Host "Perf  PASS=$($stats.perf_pass) FAIL=$($stats.perf_fail) TIMEOUT=$($stats.perf_timeout)"
              Write-Host "Eval  PASS=$($stats.eval_pass) FAIL=$($stats.eval_fail) TIMEOUT=$($stats.eval_timeout)"
              Write-Host "##vso[task.setvariable variable=HAS_RESULTS]true"
              Write-Host "##vso[task.setvariable variable=PAIR_DIR]$dst"
            displayName: 'Collect result files (${{ pairName }})'

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: $(PAIR_DIR)
              artifactName: ExampleConfigResults_${{ parameters.agentSuffix }}_${{ pairName }}
            condition: and(succeeded(), eq(variables['HAS_RESULTS'], 'true'))
            displayName: 'Publish results as artifact (${{ pairName }})'
