#################################################################################
#                              OneBranch Pipelines                              #
# This pipeline was created by EasyStart from a sample located at:              #
#   https://aka.ms/obpipelines/easystart/samples                                #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################

trigger: none # https://aka.ms/obpipelines/triggers

parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  DEBIAN_FRONTEND: noninteractive
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest' # https://aka.ms/obpipelines/containers

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main
    - repository: artifacts
      type: github
      name: gim-home/ModelKitArtifacts
      endpoint: github.com_yuesu_microsoft
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates # https://aka.ms/obpipelines/templates
  parameters:
    git:
      fetchDepth: -1
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion:
        Version: '2022'
        Network: KS1
      networkisolation:
        policy: Permissive,CFSClean
    globalSdl:
      tsa:
        enabled: false

    stages:
      - stage: Build
        displayName: 'Build Python Package'
        dependsOn: []
        jobs:
          - job: BuildWheel
            displayName: 'Build'
            pool:
              type: windows

            variables:
              ob_outputDirectory: '$(Build.SourcesDirectory)\out'
              ob_artifactBaseName: 'drop'

            steps:
              - checkout: artifacts
                fetchDepth: 1
                lfs: true

              - script: python --version
                displayName: 'Check Python version'

              - powershell: |
                  $rulesDir = "$(Build.SourcesDirectory)\ModelKitArtifacts\rules"
                  $destDir = "$(Build.SourcesDirectory)\src\winml\modelkit\analyze\rules\runtime_check_rules"
                  $parquets = Get-ChildItem "$rulesDir\*.parquet" -Recurse
                  Write-Host "Found $($parquets.Count) rule parquet file(s)"
                  foreach ($parquet in $parquets) {
                    $relativePath = $parquet.FullName.Substring($rulesDir.Length).TrimStart('\\')
                    $targetPath = Join-Path $destDir $relativePath
                    New-Item -ItemType Directory -Path (Split-Path $targetPath -Parent) -Force | Out-Null
                    Copy-Item $parquet.FullName -Destination $targetPath -Force
                  }
                  Write-Host "Copied $($parquets.Count) rule parquet file(s) to $destDir"
                displayName: 'Copy runtime check rules'

              - powershell: |
                  Add-Type -AssemblyName System.IO.Compression
                  Add-Type -AssemblyName System.IO.Compression.FileSystem

                  $rulesRoot = "$(Build.SourcesDirectory)\src\winml\modelkit\analyze\rules\runtime_check_rules"
                  $outDir = "$(ob_outputDirectory)"
                  $rulesZipPath = Join-Path $outDir "rules.zip"
                  $parquets = Get-ChildItem "$rulesRoot\*.parquet" -Recurse

                  if (-not $parquets) {
                    throw "No runtime rule parquet files found under $rulesRoot"
                  }

                  New-Item -ItemType Directory -Path $outDir -Force | Out-Null
                  if (Test-Path $rulesZipPath) {
                    Remove-Item -Path $rulesZipPath -Force
                  }

                  $zip = [System.IO.Compression.ZipFile]::Open($rulesZipPath, [System.IO.Compression.ZipArchiveMode]::Create)
                  try {
                    foreach ($parquet in $parquets) {
                      $entryName = $parquet.FullName.Substring($rulesRoot.Length).TrimStart('\').Replace('\', '/')
                      [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
                        $zip,
                        $parquet.FullName,
                        $entryName,
                        [System.IO.Compression.CompressionLevel]::Optimal
                      ) | Out-Null
                    }
                  }
                  finally {
                    $zip.Dispose()
                  }

                  Write-Host "Packed $($parquets.Count) runtime rule parquet file(s) into $rulesZipPath"
                displayName: 'Create rules.zip for drop/release'

              - task: PipAuthenticate@1
                inputs:
                  artifactFeeds: 'windows.ai.toolkit/Modelkit'
                displayName: 'Authenticate pip with Azure Artifacts'

              - script: python -m pip install --upgrade build twine packaging
                displayName: 'Install build tools'

              # Telemetry is disabled in shipped artifacts: the empty iKey
              # placeholder in src/winml/modelkit/telemetry/constants.py
              # ships unchanged in both sdist and wheel. The telemetry init
              # path short-circuits to disabled when iKey is empty (no
              # events emitted, no LoggerProvider constructed). To re-enable,
              # restore an iKey-injection step before the wheel build.
              - script: python -m build --outdir "$(ob_outputDirectory)"
                displayName: 'Build sdist and wheel'

              - script: python -m twine check "$(ob_outputDirectory)\*.whl" "$(ob_outputDirectory)\*.tar.gz"
                continueOnError: true
                displayName: 'Validate packages for PyPI'
