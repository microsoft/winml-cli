#################################################################################
#                              OneBranch Pipelines                              #
# This pipeline was created by EasyStart from a sample located at:              #
#   https://aka.ms/obpipelines/easystart/samples                                #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################

trigger: none # https://aka.ms/obpipelines/triggers

parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  DEBIAN_FRONTEND: noninteractive
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest' # https://aka.ms/obpipelines/containers

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates # https://aka.ms/obpipelines/templates
  parameters:
    git:
      fetchDepth: -1
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion:
        Version: '2022'
        Network: KS1
      networkisolation:
        policy: Permissive,CFSClean
      globalSdl:
        tsa:
          enabled: false

    stages:
      # ────────────────────────────────────────
      # Stage 1: Lint
      # ────────────────────────────────────────
      - stage: Lint
        displayName: Lint
        jobs:
          - job: LintCheck
            displayName: 'Lint & License Headers'
            pool:
              type: windows
            timeoutInMinutes: 10

            variables:
              ob_outputDirectory: '$(Build.SourcesDirectory)/out'

            steps:
              - checkout: self

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(pythonVersion)
                displayName: 'Use Python $(pythonVersion)'

              - task: PipAuthenticate@1
                inputs:
                  artifactFeeds: 'windows.ai.toolkit/Modelkit'
                displayName: 'Authenticate pip with Azure Artifacts'

              - script: python -m pip install ruff pre-commit
                displayName: 'Install lint tools'

              - script: |
                  pre-commit run insert-license --all-files
                  git diff --exit-code
                displayName: 'Check license headers'

              - script: ruff check src/ tests/
                displayName: 'Ruff lint'

      # ────────────────────────────────────────
      # Stage 2: Tests (unit, integration, regression)
      # ────────────────────────────────────────
      - stage: Test
        displayName: Test
        dependsOn: Lint
        jobs:
          - job: TestMatrix
            displayName: 'Test'
            pool:
              type: windows
            timeoutInMinutes: 30

            variables:
              ob_outputDirectory: '$(Build.SourcesDirectory)/out'

            strategy:
              matrix:
                analyze:
                  testPaths: 'tests/unit/analyze'
                models:
                  testPaths: 'tests/unit/models tests/unit/loader tests/unit/datasets tests/unit/export'
                optim:
                  testPaths: 'tests/unit/optim'
                commands:
                  testPaths: 'tests/unit/commands tests/unit/config tests/unit/build tests/unit/compiler tests/unit/session tests/unit/eval'
                remaining:
                  testPaths: 'tests/unit/core tests/unit/onnx tests/unit/cache tests/unit/utils tests/unit/sysinfo tests/unit/inspect tests/unit/optracing tests/regression'
                integration:
                  testPaths: 'tests/integration'
              maxParallel: 6

            steps:
              - checkout: self

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(pythonVersion)
                displayName: 'Use Python $(pythonVersion)'

              - task: PipAuthenticate@1
                inputs:
                  artifactFeeds: 'windows.ai.toolkit/Modelkit'
                displayName: 'Authenticate pip with Azure Artifacts'

              - script: python -m pip install ".[dev]"
                displayName: 'Install dependencies'

              - script: >
                  pytest $(testPaths) --tb=short
                  -m "not e2e and not npu and not gpu"
                  --junitxml=$(Build.StagingDirectory)/test-results.xml
                displayName: 'Run tests'

              - task: PublishTestResults@2
                condition: always()
                inputs:
                  testResultsFormat: JUnit
                  testResultsFiles: '$(Build.StagingDirectory)/test-results.xml'
                  testRunTitle: 'Tests - $(System.JobDisplayName)'
                  mergeTestResults: true
                displayName: 'Publish test results'

      # ────────────────────────────────────────
      # Stage 3: Build Wheel
      # ────────────────────────────────────────
      - stage: Build
        displayName: Build Python Package
        dependsOn: Test
        jobs:
          - job: BuildWheel
            displayName: 'Build'
            pool:
              type: windows
            timeoutInMinutes: 10

            variables:
              ob_outputDirectory: '$(Build.SourcesDirectory)/out'
              ob_artifactBaseName: 'drop'

            steps:
              - checkout: self

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(pythonVersion)
                displayName: 'Use Python $(pythonVersion)'

              - task: PipAuthenticate@1
                inputs:
                  artifactFeeds: 'windows.ai.toolkit/Modelkit'
                displayName: 'Authenticate pip with Azure Artifacts'

              - script: python -m pip install build twine
                displayName: 'Install build tools'

              - script: python -m build --outdir $(ob_outputDirectory)
                displayName: 'Build sdist and wheel'

              - script: twine check $(ob_outputDirectory)/*
                displayName: 'Validate packages for PyPI'
