#################################################################################
#                              OneBranch Pipelines                              #
# This pipeline was created by EasyStart from a sample located at:              #
#   https://aka.ms/obpipelines/easystart/samples                                #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################

trigger: none # https://aka.ms/obpipelines/triggers

parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  DEBIAN_FRONTEND: noninteractive
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest' # https://aka.ms/obpipelines/containers

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main
    - repository: artifacts
      type: github
      name: gim-home/ModelKitArtifacts
      endpoint: github.com_yuesu_microsoft
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates # https://aka.ms/obpipelines/templates
  parameters:
    git:
      fetchDepth: -1
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion:
        Version: '2022'
        Network: KS1
      networkisolation:
        policy: Permissive,CFSClean
    globalSdl:
      tsa:
        enabled: false

    stages:
      - stage: Build
        displayName: 'Build Python Package'
        dependsOn: []
        jobs:
          - job: BuildWheel
            displayName: 'Build'
            pool:
              type: windows

            variables:
              ob_outputDirectory: '$(Build.SourcesDirectory)\out'
              ob_artifactBaseName: 'drop'

            steps:
              - checkout: artifacts
                fetchDepth: 1
                lfs: true

              - script: python --version
                displayName: 'Check Python version'

              - powershell: |
                  $rulesDir = "$(Build.SourcesDirectory)\ModelKitArtifacts\rules_zip"
                  $destDir = "$(Build.SourcesDirectory)\src\winml\modelkit\analyze\rules\runtime_check_rules"
                  $outDir = "$(ob_outputDirectory)"
                  New-Item -ItemType Directory -Path $outDir -Force | Out-Null
                  $zips = Get-ChildItem "$rulesDir\*.zip"
                  Write-Host "Found $($zips.Count) rule zips"
                  $zips | Copy-Item -Destination $destDir
                  $zips | Copy-Item -Destination $outDir
                  Write-Host "Copied $($zips.Count) rule zips to $destDir and $outDir"
                displayName: 'Copy runtime check rules'

              - task: PipAuthenticate@1
                inputs:
                  artifactFeeds: 'windows.ai.toolkit/Modelkit'
                displayName: 'Authenticate pip with Azure Artifacts'

              - script: pip install build twine
                displayName: 'Install build tools'

              # Build sdist BEFORE iKey injection so the source archive
              # ships with the empty placeholder (sdist exposes source
              # to anyone who downloads it - keep it clean). Lands in a
              # temp dir so it is NOT picked up as a published artifact.
              - script: python -m build --sdist --outdir "$(Agent.TempDirectory)\sdist"
                displayName: 'Build sdist (with empty iKey placeholder)'

              - script: twine check "$(Agent.TempDirectory)\sdist\*.tar.gz"
                continueOnError: true
                displayName: 'Validate sdist for PyPI'

              - powershell: |
                  $path = "$(Build.SourcesDirectory)\src\winml\modelkit\telemetry\constants.py"
                  $key = $env:INSTRUMENTATION_KEY
                  if (-not $key) { throw "INSTRUMENTATION_KEY env var is empty or missing" }
                  $content = [System.IO.File]::ReadAllText($path)
                  $placeholder = 'INSTRUMENTATION_KEY = ""'
                  if (-not $content.Contains($placeholder)) { throw "placeholder not found in $path" }
                  $newContent = $content.Replace($placeholder, "INSTRUMENTATION_KEY = ""$key""")
                  [System.IO.File]::WriteAllText($path, $newContent)
                  Write-Host "Injected iKey into $path"
                env:
                  INSTRUMENTATION_KEY: $(INSTRUMENTATION_KEY)
                displayName: 'Inject InstrumentationKey into constants.py'

              # Build wheel AFTER injection so the wheel carries the
              # real iKey. Lands in ob_outputDirectory - this is the
              # only artifact that gets published.
              - script: python -m build --wheel --outdir "$(ob_outputDirectory)"
                displayName: 'Build wheel (with injected iKey)'

              - powershell: |
                  Add-Type -AssemblyName System.IO.Compression.FileSystem
                  $wheel = Get-ChildItem "$(ob_outputDirectory)\*.whl" | Select-Object -First 1
                  if (-not $wheel) { throw "no wheel found in $(ob_outputDirectory)" }
                  $zip = [System.IO.Compression.ZipFile]::OpenRead($wheel.FullName)
                  try {
                    $entry = $zip.Entries | Where-Object { $_.FullName -like "*telemetry/constants.py" } | Select-Object -First 1
                    if (-not $entry) { throw "telemetry/constants.py not found in wheel" }
                    $reader = [System.IO.StreamReader]::new($entry.Open())
                    $content = $reader.ReadToEnd()
                    $reader.Close()
                  } finally {
                    $zip.Dispose()
                  }
                  if ($content -match 'INSTRUMENTATION_KEY\s*=\s*""') {
                    throw "wheel contains empty INSTRUMENTATION_KEY placeholder - injection failed"
                  }
                  Write-Host "Wheel verified - constants.py has non-empty iKey"
                displayName: 'Verify wheel has injected iKey'

              - script: twine check "$(ob_outputDirectory)\*.whl"
                continueOnError: true
                displayName: 'Validate wheel for PyPI'
