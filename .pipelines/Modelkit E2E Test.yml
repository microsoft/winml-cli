# Modelkit E2E Test — PR-gating pipeline.
#
# Runs `winml perf` against a small inline list of models across all
# EP/device pairs on the three self-hosted agents (QNN, OV, AMD). Each
# stage runs in parallel. Pipeline fails if any (model, EP/device pair)
# combination fails its perf run.
#
# Notes on runtime mitigations:
#   * `pr.drafts: false` — draft PRs do not trigger this pipeline.
#   * Auto-cancel of superseded PR builds (when a new commit is pushed to
#     the same PR) is controlled by the per-pipeline portal setting
#     "Automatically cancel existing validation builds for previous
#     iterations of a pull request". Enable it once in the portal — this
#     cannot be set from YAML.
#   * The pipeline is NOT yet added as a required branch-policy check.
#     During the prototype phase, failures appear as a red status on the
#     PR but do not block merge. Promote to a required check from the
#     portal once we are confident.

trigger: none

pr:
  branches:
    include:
      - main
  drafts: false

resources:
  repositories:
    - repository: ModelKitArtifacts
      type: github
      endpoint: github.com_yuesu_microsoft
      name: gim-home/ModelKitArtifacts
      ref: main

parameters:
  # Inline model list. Each entry: { hf_id: <str>, task: <str> }.
  # Extend over time; keep small to keep PR feedback fast.
  - name: models
    displayName: 'Models to test (inline list)'
    type: object
    default:
      - hf_id: facebook/convnext-tiny-224
        task: image-classification

  - name: modelTimeout
    displayName: 'Per-model timeout (seconds)'
    type: number
    default: 1800

  - name: qnnAgentName
    displayName: 'QNN: self-hosted agent name (Agent.Name)'
    type: string
    default: NPU-QNN
  - name: qnnPairs
    displayName: 'QNN: EP/device pairs (any of: qnn_npu, qnn_gpu)'
    type: object
    default:
      - qnn_npu
      - qnn_gpu

  - name: ovAgentName
    displayName: 'OV: self-hosted agent name (Agent.Name)'
    type: string
    default: NPU-OV2
  - name: ovPairs
    displayName: 'OV: EP/device pairs (any of: dml_gpu, mlas_cpu, ov_cpu, ov_gpu, ov_npu)'
    type: object
    default:
      - dml_gpu
      - mlas_cpu
      - ov_cpu
      - ov_gpu
      - ov_npu

  - name: amdAgentName
    displayName: 'AMD: self-hosted agent name (Agent.Name)'
    type: string
    default: NPU-AMD
  - name: amdPairs
    displayName: 'AMD: EP/device pairs (any of: vitisai_npu)'
    type: object
    default:
      - vitisai_npu

stages:
  - stage: NPU_QNN
    displayName: 'E2E Test — QNN'
    jobs:
      - template: templates/e2e-test-jobs.yml
        parameters:
          agentName: ${{ parameters.qnnAgentName }}
          agentSuffix: qnn
          pairNames: ${{ parameters.qnnPairs }}
          models: ${{ parameters.models }}
          modelTimeout: ${{ parameters.modelTimeout }}

  - stage: NPU_OV
    displayName: 'E2E Test — OV'
    dependsOn: []
    jobs:
      - template: templates/e2e-test-jobs.yml
        parameters:
          agentName: ${{ parameters.ovAgentName }}
          agentSuffix: ov
          pairNames: ${{ parameters.ovPairs }}
          models: ${{ parameters.models }}
          modelTimeout: ${{ parameters.modelTimeout }}

  - stage: NPU_AMD
    displayName: 'E2E Test — AMD'
    dependsOn: []
    jobs:
      - template: templates/e2e-test-jobs.yml
        parameters:
          agentName: ${{ parameters.amdAgentName }}
          agentSuffix: amd
          pairNames: ${{ parameters.amdPairs }}
          models: ${{ parameters.models }}
          modelTimeout: ${{ parameters.modelTimeout }}
