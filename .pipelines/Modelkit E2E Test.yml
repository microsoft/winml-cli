trigger: none

resources:
  repositories:
    - repository: ModelKitArtifacts
      type: github
      endpoint: github.com_yuesu_microsoft
      name: gim-home/ModelKitArtifacts
      ref: main

parameters:
  - name: evalDate
    displayName: 'Eval date (auto = today, e.g. 2026-04-01)'
    type: string
    default: 'auto'
  - name: continueRun
    displayName: 'Skip already-evaluated models (--continue)'
    type: boolean
    default: true
  - name: ovPairs
    displayName: 'NPU-OV: EP/device pairs (any of: dml_gpu, mlas_cpu, ov_cpu, ov_gpu, ov_npu)'
    type: object
    default:
      - dml_gpu
      - mlas_cpu
      - ov_cpu
      - ov_gpu
      - ov_npu

stages:
  - stage: NPU_QNN
    displayName: 'E2E Eval — NPU-QNN'
    jobs:
      - template: templates/e2e-eval-jobs.yml
        parameters:
          agentName: NPU-QNN
          agentSuffix: qnn
          evalDate: ${{ parameters.evalDate }}
          continueRun: ${{ parameters.continueRun }}

  - stage: NPU_OV
    displayName: 'E2E Eval — NPU-OV'
    dependsOn: []
    jobs:
      - template: templates/e2e-eval-jobs.yml
        parameters:
          agentName: NPU-OV
          agentSuffix: ov
          evalDate: ${{ parameters.evalDate }}
          continueRun: ${{ parameters.continueRun }}
          epDevicePairs:
            - ${{ if containsValue(parameters.ovPairs, 'dml_gpu') }}:
                name: dml_gpu
                displayName: 'DML GPU'
                ep: dml
                device: gpu
            - ${{ if containsValue(parameters.ovPairs, 'mlas_cpu') }}:
                name: mlas_cpu
                displayName: 'MLAS CPU'
                ep: cpu
                device: cpu
            - ${{ if containsValue(parameters.ovPairs, 'ov_cpu') }}:
                name: ov_cpu
                displayName: 'OV CPU'
                ep: ov
                device: cpu
            - ${{ if containsValue(parameters.ovPairs, 'ov_gpu') }}:
                name: ov_gpu
                displayName: 'OV GPU'
                ep: ov
                device: gpu
            - ${{ if containsValue(parameters.ovPairs, 'ov_npu') }}:
                name: ov_npu
                displayName: 'OV NPU'
                ep: ov
                device: npu

  - stage: NPU_AMD
    displayName: 'E2E Eval — NPU-AMD'
    dependsOn: []
    jobs:
      - template: templates/e2e-eval-jobs.yml
        parameters:
          agentName: NPU-AMD
          agentSuffix: amd
          evalDate: ${{ parameters.evalDate }}
          continueRun: ${{ parameters.continueRun }}
