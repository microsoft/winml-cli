name: Lint

on:
  pull_request:
    branches: [main, "release/*"]
  push:
    branches: [main, "release/*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Check license headers
        run: |
          uv run pre-commit run insert-license --all-files

      - name: Lint
        run: uv run ruff check src/ tests/

      # Required type check: these folders are clean against the strict
      # config in pyproject.toml. Any new mypy error here blocks the PR.
      # Expand the package list as more folders are cleaned up.
      #
      # Run per-package so each one prints its own "checked N source files"
      # summary into a collapsible CI log group. Makes it obvious which
      # package contributes which files and which one is failing, instead
      # of one mega-run where the total is opaque.
      - name: Type check (required)
        shell: bash
        run: |
          set -uo pipefail
          failed=0
          for pkg in analyze build cache commands compiler config core data; do
            echo "::group::winml.modelkit.$pkg"
            if uv run mypy -p "winml.modelkit.$pkg"; then
              :
            else
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed
